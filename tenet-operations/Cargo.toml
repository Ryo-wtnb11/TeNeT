[package]
name = "tenet-operations"
version = "0.1.0"
edition.workspace = true
license.workspace = true
repository.workspace = true

[lib]
name = "tenet_operations"
path = "src/lib.rs"

[features]
default = ["cpu-faer"]
cpu-faer = ["tenet-dense/cpu-faer"]
cpu-blas = ["tenet-dense/cpu-blas"]
blas-accelerate = ["tenet-dense/blas-accelerate"]
blas-openblas = ["tenet-dense/blas-openblas"]
blas-mkl = ["tenet-dense/blas-mkl"]
provider-inject = ["tenet-dense/provider-inject"]

[dependencies]
tenet-core = { path = "../tenet-core" }
tenet-dense = { path = "../tenet-dense", default-features = false }
strided-kernel = { git = "https://github.com/Ryo-wtnb11/strided-rs", rev = "bd6d0775b17b83eff19b0f1b3825059bb6ee66c7", version = "0.1.0", features = ["parallel"] }
num-traits = "0.2"
num-complex = "0.4"
