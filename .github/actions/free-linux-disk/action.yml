name: Free Linux disk space
description: Reclaim unused preinstalled toolchains before workspace-wide Rust builds

runs:
  using: composite
  steps:
    - shell: bash
      run: |
        sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc \
          /opt/hostedtoolcache/CodeQL /usr/local/.ghcup
        sudo docker image prune --all --force || true
        df -h /
