name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

# TeNeT depends on tenferro-rs via a sibling path dependency
# (`../../tenferro-rs`). CI checks out tenferro-rs at `main` next to this repo
# so builds run against upstream `main`, never a developer's local branch.
# strided-rs is pulled from crates.io by tenferro, so it needs no checkout.

jobs:
  fmt:
    name: rustfmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          path: tenet
      - uses: actions/checkout@v4
        with:
          repository: tensor4all/tenferro-rs
          ref: main
          path: tenferro-rs
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: tenet
      - run: cargo fmt --check
        working-directory: tenet

  test:
    name: cargo test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4
        with:
          path: tenet
      - uses: actions/checkout@v4
        with:
          repository: tensor4all/tenferro-rs
          ref: main
          path: tenferro-rs
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: tenet
      - run: cargo test --workspace
        working-directory: tenet

  coverage:
    name: coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          path: tenet
      - uses: actions/checkout@v4
        with:
          repository: tensor4all/tenferro-rs
          ref: main
          path: tenferro-rs
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools-preview
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: tenet
      - uses: taiki-e/install-action@cargo-llvm-cov
      - name: Generate coverage JSON
        run: cargo llvm-cov --workspace --json --output-path coverage.json
        working-directory: tenet
      - name: Check per-file thresholds
        run: python3 scripts/check-coverage.py coverage.json
        working-directory: tenet
