name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

# TeNeT depends on tenferro-rs via a sibling path dependency
# (`../../tenferro-rs`). CI checks out tenferro-rs at `main` next to this repo
# so builds run against upstream `main`, never a developer's local branch.
# strided-rs is pulled from crates.io by tenferro, so it needs no checkout.

jobs:
  changes:
    name: classify changes
    runs-on: ubuntu-latest
    outputs:
      light_rust: ${{ steps.scope.outputs.light_rust }}
    steps:
      - uses: actions/checkout@v4
        with:
          path: tenet
          fetch-depth: 0
      - id: scope
        run: |
          set -euo pipefail

          light_rust=false
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            light_rust=true
            files="$(git -C tenet diff --name-only \
              "${{ github.event.pull_request.base.sha }}" \
              "${{ github.event.pull_request.head.sha }}")"

            echo "Changed files:"
            printf '%s\n' "$files"

            while IFS= read -r file; do
              [ -z "$file" ] && continue
              case "$file" in
                tenet-krylov/*|Cargo.toml|.github/workflows/ci.yml)
                  ;;
                *)
                  light_rust=false
                  ;;
              esac
            done <<< "$files"
          fi

          echo "light_rust=$light_rust" >> "$GITHUB_OUTPUT"

  fmt:
    name: rustfmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          path: tenet
      - uses: actions/checkout@v4
        with:
          repository: tensor4all/tenferro-rs
          ref: main
          path: tenferro-rs
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: tenet
      - run: cargo fmt --check
        working-directory: tenet

  test-linux:
    name: cargo test (ubuntu-latest)
    needs: changes
    runs-on: ubuntu-latest
    steps:
      # Linking the debug example binaries (each statically links the full
      # dependency graph) exhausts the ubuntu runner's disk, crashing the linker
      # with SIGBUS ("ld terminated with signal 7 [Bus error]"). Reclaim the
      # preinstalled toolchains we do not use so the link has room.
      - name: Free disk space (Linux)
        if: needs.changes.outputs.light_rust != 'true'
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc \
            /opt/hostedtoolcache/CodeQL /usr/local/.ghcup
          sudo docker image prune --all --force || true
          df -h /
      - uses: actions/checkout@v4
        with:
          path: tenet
      - uses: actions/checkout@v4
        with:
          repository: tensor4all/tenferro-rs
          ref: main
          path: tenferro-rs
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: tenet
      - name: Run cargo test
        run: |
          if [ "${{ needs.changes.outputs.light_rust }}" = "true" ]; then
            cargo test -p tenet-krylov
          else
            cargo test --workspace
          fi
        working-directory: tenet

  test-macos:
    name: cargo test (macos-latest)
    needs: changes
    if: needs.changes.outputs.light_rust != 'true'
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
        with:
          path: tenet
      - uses: actions/checkout@v4
        with:
          repository: tensor4all/tenferro-rs
          ref: main
          path: tenferro-rs
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: tenet
      - run: cargo test --workspace
        working-directory: tenet

  coverage:
    name: coverage
    needs: changes
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          path: tenet
      - uses: actions/checkout@v4
        with:
          repository: tensor4all/tenferro-rs
          ref: main
          path: tenferro-rs
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools-preview
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: tenet
      - uses: taiki-e/install-action@cargo-llvm-cov
      - name: Generate coverage JSON
        run: |
          if [ "${{ needs.changes.outputs.light_rust }}" = "true" ]; then
            cargo llvm-cov -p tenet-krylov --json --output-path coverage.json
          else
            cargo llvm-cov --workspace --json --output-path coverage.json
          fi
        working-directory: tenet
      - name: Check per-file thresholds
        run: python3 scripts/check-coverage.py coverage.json
        working-directory: tenet
