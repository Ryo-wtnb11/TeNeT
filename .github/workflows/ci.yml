name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event_name == 'pull_request' && github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

env:
  CARGO_TERM_COLOR: always
  GMP_MPFR_SYS_CACHE: ${{ github.workspace }}/.cache/gmp-mpfr-sys
  # Why-not keep default DWARF: heavy Linux tests do not inspect it, while its
  # artifacts exhaust hosted-runner disk and linker memory.
  # Why-not delete more image paths: that treats the symptom and can destabilize
  # hosted images. Why-not coverage: llvm-cov owns its instrumentation contract.
  CI_HEAVY_TEST_DEBUG: '0'

# TeNeT depends on tenferro-rs via a sibling path dependency
# (`../../tenferro-rs`). CI checks out tenferro-rs at `main` next to this repo
# so builds run against upstream `main`, never a developer's local branch.
# strided-rs is pulled from crates.io by tenferro, so it needs no checkout.

jobs:
  changes:
    name: classify changes
    runs-on: ubuntu-latest
    outputs:
      light_rust: ${{ steps.scope.outputs.light_rust }}
    steps:
      - uses: actions/checkout@v4
        with:
          path: tenet
          fetch-depth: 0
      - id: scope
        run: |
          set -euo pipefail

          light_rust=false
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            light_rust=true
            files="$(git -C tenet diff --name-only \
              "${{ github.event.pull_request.base.sha }}" \
              "${{ github.event.pull_request.head.sha }}")"

            echo "Changed files:"
            printf '%s\n' "$files"

            while IFS= read -r file; do
              [ -z "$file" ] && continue
              case "$file" in
                tenet-krylov/*|Cargo.toml|.github/workflows/ci.yml)
                  ;;
                *)
                  light_rust=false
                  ;;
              esac
            done <<< "$files"
          fi

          echo "light_rust=$light_rust" >> "$GITHUB_OUTPUT"

  fmt:
    name: rustfmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          path: tenet
      - uses: actions/checkout@v4
        with:
          repository: tensor4all/tenferro-rs
          ref: main
          path: tenferro-rs
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: tenet
      - run: cargo fmt --check
        working-directory: tenet

  backend-contract:
    name: backend contract (${{ matrix.name }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - { name: cpu-blas-core, os: ubuntu-latest, features: cpu-blas }
          - { name: openblas, os: ubuntu-latest, features: blas-openblas }
          - { name: mkl, os: ubuntu-latest, features: blas-mkl }
          - { name: provider-inject, os: ubuntu-latest, features: provider-inject }
          - { name: accelerate, os: macos-latest, features: blas-accelerate }
    steps:
      - uses: actions/checkout@v4
        with:
          path: tenet
      - uses: actions/checkout@v4
        with:
          repository: tensor4all/tenferro-rs
          ref: main
          path: tenferro-rs
      - uses: dtolnay/rust-toolchain@stable
      - uses: ./tenet/.github/actions/cache-gmp
      - name: Install Accelerate build toolchain
        if: matrix.name == 'accelerate'
        run: brew install gcc
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: tenet
          key: backend-${{ matrix.name }}
      # Only openblas pays a native source build; the other rows are ~1 min and
      # would only lose time to the extra cache round-trip.
      - if: matrix.name == 'openblas'
        uses: ./tenet/.github/actions/cargo-build-script-cache
        with:
          key: backend-openblas
      - run: cargo check --workspace --all-targets --no-default-features --features "${{ matrix.features }}"
        working-directory: tenet

  # opt-path (wraps opt-einsum-path) and cotengra-python (shells out to an
  # installed Python `cotengra`) have real code but, unlike the backend rows
  # above, no matrix coverage anywhere in CI (#153). Both need a host
  # execution backend to run anything, so cpu-faer rides along. Unlike
  # backend-contract this runs the actual test suite, not just `cargo
  # check`: the point is to start exercising optimizer_fallback.rs /
  # plan_cache.rs's feature-gated tests, which today never run in CI.
  # cotengra-python is build + unit tests only — its one test that shells
  # out to Python (`runs_installed_cotengra_when_requested`) early-returns
  # unless `TENET_RUN_COTENGRA_PYTHON_TEST` is set, so no Python env is
  # needed here.
  feature-contract:
    name: feature contract (${{ matrix.name }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - { name: opt-path, features: "opt-path,cpu-faer" }
          - { name: cotengra-python, features: "cotengra-python,cpu-faer" }
    steps:
      - uses: actions/checkout@v4
        with:
          path: tenet
      - uses: actions/checkout@v4
        with:
          repository: tensor4all/tenferro-rs
          ref: main
          path: tenferro-rs
      - uses: dtolnay/rust-toolchain@stable
      - uses: ./tenet/.github/actions/cache-gmp
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: tenet
          key: feature-${{ matrix.name }}
      - uses: ./tenet/.github/actions/cargo-build-script-cache
        with:
          key: feature-${{ matrix.name }}
      - run: cargo test -p tenet-network --no-default-features --features "${{ matrix.features }}"
        working-directory: tenet
        env:
          CARGO_PROFILE_TEST_DEBUG: ${{ env.CI_HEAVY_TEST_DEBUG }}

  cuda-check:
    name: CUDA compile contract
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          path: tenet
      - uses: actions/checkout@v4
        with:
          repository: tensor4all/tenferro-rs
          ref: main
          path: tenferro-rs
      - uses: Jimver/cuda-toolkit@v0.2.28
        with:
          method: network
      - uses: dtolnay/rust-toolchain@stable
      - uses: ./tenet/.github/actions/cache-gmp
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: tenet
          key: backend-cuda
      - run: cargo check --workspace --all-targets --no-default-features --features cuda,cpu-faer
        working-directory: tenet

  test-linux:
    name: cargo test (ubuntu-latest)
    needs: changes
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          path: tenet
      - uses: actions/checkout@v4
        with:
          repository: tensor4all/tenferro-rs
          ref: main
          path: tenferro-rs
      - uses: dtolnay/rust-toolchain@stable
      - uses: ./tenet/.github/actions/cache-gmp
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: tenet
      - uses: ./tenet/.github/actions/cargo-build-script-cache
        with:
          key: test-linux
      - name: Run light Rust tests
        if: needs.changes.outputs.light_rust == 'true'
        run: cargo test -p tenet-krylov
        working-directory: tenet
      - name: Run workspace tests
        if: needs.changes.outputs.light_rust != 'true'
        run: cargo test --workspace
        working-directory: tenet
        env:
          CARGO_PROFILE_TEST_DEBUG: ${{ env.CI_HEAVY_TEST_DEBUG }}
      - name: Check the backend-selection diagnostic
        run: |
          set -euo pipefail
          if cargo check --workspace --no-default-features 2>no-backend.log; then
            echo "no-default-features unexpectedly compiled" >&2
            exit 1
          fi
          grep -F "tenet-operations requires a host execution backend" no-backend.log
        working-directory: tenet

  test-macos:
    name: cargo test (macos-latest)
    needs: changes
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
        with:
          path: tenet
      - uses: actions/checkout@v4
        with:
          repository: tensor4all/tenferro-rs
          ref: main
          path: tenferro-rs
      - uses: dtolnay/rust-toolchain@stable
      - uses: ./tenet/.github/actions/cache-gmp
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: tenet
          key: workspace-test-debug0-v1
      - uses: ./tenet/.github/actions/cargo-build-script-cache
        with:
          key: test-macos
      - run: cargo test --workspace
        working-directory: tenet
        env:
          CARGO_PROFILE_TEST_DEBUG: ${{ env.CI_HEAVY_TEST_DEBUG }}

  coverage:
    name: coverage
    needs: changes
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          path: tenet
      - uses: actions/checkout@v4
        with:
          repository: tensor4all/tenferro-rs
          ref: main
          path: tenferro-rs
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools-preview
      - uses: ./tenet/.github/actions/cache-gmp
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: tenet
          # Coverage instrumentation produces a large, short-lived target tree.
          # Restoring it alongside the runner image exhausted disk during link.
          cache-targets: false
      - uses: taiki-e/install-action@cargo-llvm-cov
      - name: Generate coverage JSON
        run: |
          if [ "${{ needs.changes.outputs.light_rust }}" = "true" ]; then
            cargo llvm-cov -p tenet-krylov --json --output-path coverage.json
          else
            cargo llvm-cov --workspace --json --output-path coverage.json
          fi
        working-directory: tenet
        env:
          CARGO_PROFILE_TEST_DEBUG: ${{ env.CI_HEAVY_TEST_DEBUG }}
      - name: Check per-file thresholds
        run: python3 scripts/check-coverage.py coverage.json
        working-directory: tenet

  clippy:
    name: clippy
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          path: tenet
      - uses: actions/checkout@v4
        with:
          repository: tensor4all/tenferro-rs
          ref: main
          path: tenferro-rs
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: ./tenet/.github/actions/cache-gmp
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: tenet
          key: clippy
      # Non-gating for now (#153). `clippy::result_large_err` no longer needs
      # an `-A` here: #231 boxed the large payloads on `CoreError` and
      # `OperationError` (536 -> 96 B, under the lint's default threshold),
      # so the whole category self-clears. `cargo clippy --workspace
      # --all-targets` still turns up ~130 pre-existing warnings spread
      # across ~25 other lint categories (clippy::too_many_arguments,
      # clippy::type_complexity,
      # clippy::manual_contains, clippy::doc_lazy_continuation,
      # clippy::needless_range_loop, clippy::useless_vec,
      # clippy::large_enum_variant, clippy::wrong_self_convention, ...) —
      # too broad and too shallow a spread per category to allowlist away
      # without also hiding genuinely new signal. Ratchet plan: burn these
      # down category by category in follow-up PRs (tackle the largest
      # counts first), then flip this job to `-D warnings` once clippy is
      # clean. `continue-on-error: true` keeps the job's output visible in
      # the Actions UI without blocking merges in the meantime.
      - run: cargo clippy --workspace --all-targets
        working-directory: tenet
        continue-on-error: true
