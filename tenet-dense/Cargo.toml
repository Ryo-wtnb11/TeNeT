[package]
name = "tenet-dense"
version = "0.1.0"
edition.workspace = true
license.workspace = true
repository.workspace = true

[lib]
name = "tenet_dense"
path = "src/lib.rs"

[features]
default = ["tenferro"]
tenferro = [
    "dep:tenferro-cpu",
    "dep:tenferro-linalg",
    "dep:tenferro-tensor",
    "dep:strided-einsum2",
    "tenferro-cpu/cpu-faer",
    "tenferro-linalg/cpu-faer",
    "strided-einsum2/faer",
    "strided-einsum2/parallel",
]

[dependencies]
num-complex = "0.4"
num-traits = "0.2"
strided-einsum2 = { git = "https://github.com/tensor4all/strided-rs", rev = "71bdd913158a87437e51f4f9b69cba4cac6f5082", version = "0.1.0", default-features = false, optional = true }
tenferro-cpu = { path = "../../tenferro-rs/crates/tenferro-cpu", default-features = false, optional = true }
tenferro-linalg = { path = "../../tenferro-rs/crates/tenferro-linalg", default-features = false, optional = true }
tenferro-tensor = { path = "../../tenferro-rs/crates/tenferro-tensor", default-features = false, optional = true }
